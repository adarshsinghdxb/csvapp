<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSV App — Results</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #666;
      --success: #47ffaa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
    }

    header h1 {
      font-family: 'DM Mono', monospace;
      font-size: 1.4rem;
      color: var(--accent);
    }

    .back {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      transition: color 0.2s, border-color 0.2s;
    }

    .back:hover { color: var(--accent); border-color: var(--accent); }

    .success-banner {
      background: rgba(71,255,170,0.08);
      border: 1px solid rgba(71,255,170,0.2);
      border-radius: 8px;
      padding: 1rem 1.5rem;
      margin-bottom: 2rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .meta-row {
      display: flex;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .meta-item {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
    }

    .meta-item .label { color: var(--muted); margin-bottom: 0.25rem; }
    .meta-item .value { color: var(--text); font-size: 1rem; }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    thead th {
      background: #222;
      padding: 0.9rem 1.2rem;
      text-align: left;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #222; }

    tbody td {
      padding: 0.8rem 1.2rem;
      font-family: 'DM Mono', monospace;
    }

    .price {
      color: var(--accent);
      text-align: right;
    }

    .product-id { color: var(--muted); font-size: 0.78rem; }
  </style>
</head>
<body>

<header>
  <h1>csvapp <span style="color:#444">/ results</span></h1>
  <a href="/" class="back">← back</a>
</header>

<div class="success-banner">
  ✓ &nbsp; {{ filename }} processed and uploaded to storage
</div>

<div class="meta-row">
  <div class="meta-item">
    <div class="label">file</div>
    <div class="value">{{ filename }}</div>
  </div>
  <div class="meta-item">
    <div class="label">rows</div>
    <div class="value">{{ rows|length }}</div>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Product ID</th>
        <th>Product Name</th>
        <th style="text-align:right">Price (AED)</th>
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr>
        <td class="product-id">{{ row.product_id }}</td>
        <td>{{ row.product_name }}</td>
        <td class="price">{{ "%.2f"|format(row.price) }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

</body>
</html>
